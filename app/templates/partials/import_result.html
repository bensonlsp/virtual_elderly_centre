{% if imported > 0 %}
<div class="alert alert-success mb-3">
  <svg class="w-5 h-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
  </svg>
  <span>成功匯入 <strong>{{ imported }}</strong> 位會員{% if skipped > 0 %}，略過 {{ skipped }} 筆（重複或缺少姓名）{% endif %}。</span>
</div>
{% else %}
<div class="alert alert-warning mb-3">
  <span>未匯入任何會員{% if skipped > 0 %}（{{ skipped }} 筆全部略過）{% endif %}。</span>
</div>
{% endif %}
{% if errors %}
<div class="text-sm text-error space-y-1">
  {% for e in errors %}<p>{{ e }}</p>{% endfor %}
</div>
{% endif %}
<div class="mt-4 flex gap-2">
  <a href="/members/" class="btn btn-sm btn-primary">查看會員列表</a>
  <button class="btn btn-sm btn-ghost" onclick="document.getElementById('import-modal').close()">關閉</button>
</div>
